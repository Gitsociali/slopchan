          done

      - name: Build React app
        shell: bash
        run: yarn build
        env:
          CI: ''

      - name: Build preload script
        shell: bash
        run: yarn build:preload

      - name: Verify build outputs
        shell: bash
        run: |
          ls -la build/ || exit 1
