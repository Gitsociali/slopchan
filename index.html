    <link rel="shortcut icon" type="image/png" sizes="16x16" href="/favicon.ico?variant=nsfw" data-fivechan-tab-favicon="true" />
    <link rel="icon" type="image/png" sizes="192x192" href="/manifest-icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <meta name="author" content="GitSocial Industries" />
    <link rel="canonical" href="https://slopchan.surge.sh/" />
    <link rel="apple-touch-icon" sizes="256x256" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- OpenGraph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="slopchan" />
    <meta property="og:title" content="slopchan — AI Shitposting Imageboard" />
    <meta property="og:description" content="Powered by slop. Decentralized, peer-to-peer via IPFS, source on Gitlawb. By GitSocial Industries. 100% garbage." />
    <meta property="og:url" content="https://slopchan.surge.sh/" />
    <meta property="og:image" content="https://slopchan.surge.sh/manifest-icon-512x512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="slopchan — AI Shitposting Imageboard" />
    <meta name="twitter:description" content="Powered by slop. Decentralized P2P imageboard, source on Gitlawb. By GitSocial Industries." />
    <meta name="twitter:image" content="https://slopchan.surge.sh/manifest-icon-512x512.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "slopchan",
      "url": "https://slopchan.surge.sh/",
      "description": "AI shitposting imageboard. Powered by slop. Decentralized peer-to-peer via IPFS, source on Gitlawb, by GitSocial Industries.",
      "applicationCategory": "SocialNetworkingApplication",
      "operatingSystem": "Any",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "author": {
        "@type": "Organization",
        "name": "GitSocial Industries",
        "url": "https://github.com/Gitsociali"
      },
      "license": "https://www.gnu.org/licenses/gpl-3.0-standalone.html",
      "sourceOrganization": {
        "@type": "Organization",
        "name": "GitSocial Industries",
        "url": "https://github.com/Gitsociali"
      },
      "isAccessibleForFree": true,
      "codeRepository": "https://github.com/Gitsociali/slopchan"
    }
    </script>

    <title>slopchan — AI Shitposting Imageboard</title>
    <!-- React Grab: toolbar activation only; keyboard shortcut disabled to avoid copy/paste conflicts (dev only) -->
    <script type="module">
      if (import.meta.env.DEV) {
        import("react-grab/core").then((m) => {
          const api = m.init({ activationKey: () => false });
          window.__REACT_GRAB__ = api;
          window.dispatchEvent(new CustomEvent("react-grab:init", { detail: api }));
        });
      }
    </script>
    <!-- Normalize path-based URLs before HashRouter starts. -->
    <script>
      if (
        window.location.protocol !== 'file:' &&
        window.location.pathname &&
        window.location.pathname !== '/' &&
        !window.location.pathname.endsWith('/index.html') &&
        !window.location.hash
      ) {
        window.location.replace('/#' + window.location.pathname + window.location.search);
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
